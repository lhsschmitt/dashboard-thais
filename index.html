<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard Thais</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#F7F6F3;--s:#fff;--s2:#F0EEE9;--b:#E4E1D9;--t:#1A1916;--m:#7A7770;--a:#2D5BE3;--al:#EAF0FF;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--t)}
header{background:var(--s);border-bottom:1px solid var(--b);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10}
.logo{font-size:15px;font-weight:600}.logo span{color:var(--a)}
.upd{font-size:11px;color:var(--m)}
main{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:22px;font-weight:600;margin-bottom:2px}
.sub{font-size:13px;color:var(--m);margin-bottom:1.5rem}
.f{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:10px 14px;align-items:center}
.f label{font-size:12px;color:var(--m);font-weight:500}
select{font-family:"DM Sans",sans-serif;font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--b);background:var(--bg);color:var(--t);cursor:pointer}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.5rem}
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:1rem}
.card.ac{background:var(--a);border-color:var(--a)}
.cl{font-size:11px;color:var(--m);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.card.ac .cl{color:rgba(255,255,255,.7)}
.cv{font-size:21px;font-weight:600}.card.ac .cv{color:#fff}
.cs{font-size:12px;color:var(--m);margin-top:3px}.card.ac .cs{color:rgba(255,255,255,.6)}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1.5rem}
@media(max-width:580px){.charts{grid-template-columns:1fr}}
.cbox{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:1.1rem}
.ct{font-size:11px;font-weight:600;color:var(--m);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.cw{position:relative;width:100%;height:220px}
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;font-size:11px;color:var(--m)}
.leg span{display:flex;align-items:center;gap:4px}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.tbox{background:var(--s);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;margin-bottom:1.5rem}
.th2{padding:.9rem 1.1rem;border-bottom:1px solid var(--b);font-size:11px;font-weight:600;color:var(--m);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.tc{font-size:11px;background:var(--s2);padding:2px 8px;border-radius:999px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--m);font-weight:500;padding:8px 14px;background:var(--s2);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--b)}
td{padding:10px 14px;border-bottom:1px solid var(--b)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500}
.mp{display:inline-block;font-size:11px;font-weight:500;color:var(--a);background:var(--al);padding:2px 8px;border-radius:999px}
.empty{text-align:center;padding:2.5rem;color:var(--m);font-size:13px}
</style>
</head>
<body>
<header>
  <div class="logo">Controle <span>Thais</span></div>
  <div class="upd">Atualizado em 27/04/2026</div>
</header>
<main>
  <h1>Dashboard de contas</h1>
  <div class="sub">Lançamentos por mês de fatura</div>
  <div class="f">
    <label>Fatura:</label>
    <select id="sM" onchange="render()"><option value="all">Todos os meses</option></select>
    <label style="margin-left:6px">Loja:</label>
    <select id="sD" onchange="render()"><option value="all">Todas as lojas</option></select>
  </div>
  <div class="cards" id="cards"></div>
  <div class="charts">
    <div class="cbox"><div class="ct">Total por fatura</div><div class="cw"><canvas id="cB"></canvas></div></div>
    <div class="cbox"><div class="ct">Por loja</div><div class="leg" id="legD"></div><div class="cw"><canvas id="cD"></canvas></div></div>
  </div>
  <div class="tbox">
    <div class="th2">Lançamentos<span class="tc" id="tc">0</span></div>
    <table>
      <thead><tr>
        <th style="width:95px">Data</th><th>Descrição</th>
        <th style="width:100px">Fatura</th>
        <th style="width:110px;text-align:right">Valor</th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table>
    <div id="emp" class="empty" style="display:none">Nenhum lançamento.</div>
  </div>
</main>
<script>
var AD=[{"data":"02/04/2026","desc":"Cacau Show","mes":"Maio","val":63.49},{"data":"02/04/2026","desc":"Cacau Show","mes":"Junho","val":63.49},{"data":"04/04/2026","desc":"JCM","mes":"Maio","val":81.94},{"data":"06/04/2026","desc":"Studio Z","mes":"Maio","val":69.99},{"data":"06/04/2026","desc":"Studio Z","mes":"Junho","val":69.99},{"data":"07/04/2026","desc":"VestCasa","mes":"Maio","val":84.72},{"data":"07/04/2026","desc":"VestCasa","mes":"Junho","val":84.72},{"data":"07/04/2026","desc":"VestCasa","mes":"Julho","val":84.72},{"data":"07/04/2026","desc":"VestCasa","mes":"Agosto","val":84.72},{"data":"07/04/2026","desc":"VestCasa","mes":"Setembro","val":84.72},{"data":"07/04/2026","desc":"VestCasa","mes":"Outubro","val":84.72},{"data":"10/04/2026","desc":"Me.Linda","mes":"Maio","val":54.4},{"data":"10/04/2026","desc":"Me.Linda","mes":"Junho","val":54.4},{"data":"11/04/2026","desc":"Studio Z","mes":"Maio","val":60.0},{"data":"11/04/2026","desc":"Studio Z","mes":"Junho","val":60.0},{"data":"11/04/2026","desc":"ropek confeccoes","mes":"Maio","val":39.9},{"data":"11/04/2026","desc":"ropek confeccoes","mes":"Junho","val":39.9},{"data":"11/04/2026","desc":"leo cosmeticos","mes":"Maio","val":40.48},{"data":"11/04/2026","desc":"jim.com maria cristina","mes":"Maio","val":48.0},{"data":"11/04/2026","desc":"brisa mini mercado","mes":"Maio","val":20.89},{"data":"11/04/2026","desc":"mil bijus","mes":"Maio","val":20.0},{"data":"14/04/2026","desc":"vestcasa big-ct","mes":"Maio","val":50.12},{"data":"14/04/2026","desc":"vestcasa big-ct","mes":"Junho","val":50.12},{"data":"14/04/2026","desc":"vestcasa big-ct","mes":"Julho","val":50.12},{"data":"14/04/2026","desc":"vestcasa big-ct","mes":"Agosto","val":50.12},{"data":"14/04/2026","desc":"Atacado","mes":"Maio","val":85.5},{"data":"14/04/2026","desc":"Atacado","mes":"Junho","val":85.5},{"data":"14/04/2026","desc":"Atacado","mes":"Julho","val":85.5},{"data":"21/04/2026","desc":"Havan","mes":"Maio","val":48.32},{"data":"21/04/2026","desc":"Havan","mes":"Junho","val":48.32},{"data":"21/04/2026","desc":"Havan","mes":"Julho","val":48.32},{"data":"22/04/2026","desc":"daniela rora","mes":"Maio","val":63.33},{"data":"22/04/2026","desc":"daniela rora","mes":"Junho","val":63.33},{"data":"22/04/2026","desc":"daniela rora","mes":"Julho","val":63.33},{"data":"22/04/2026","desc":"alexandrados","mes":"Maio","val":30.0},{"data":"22/04/2026","desc":"panificadora-ct raria","mes":"Maio","val":17.49},{"data":"22/04/2026","desc":"Studio Z","mes":"Maio","val":148.32},{"data":"22/04/2026","desc":"Studio Z","mes":"Junho","val":148.32},{"data":"22/04/2026","desc":"Studio Z","mes":"Julho","val":148.32},{"data":"24/04/2026","desc":"54610135eder","mes":"Maio","val":50.0},{"data":"25/04/2026","desc":"las moditas calcad","mes":"Maio","val":62.99},{"data":"25/04/2026","desc":"las moditas calcad","mes":"Junho","val":62.99},{"data":"25/04/2026","desc":"las moditas calcad","mes":"Julho","val":62.99},{"data":"25/04/2026","desc":"las moditas calcad","mes":"Agosto","val":62.99},{"data":"25/04/2026","desc":"oliveiras bijuterias e","mes":"Maio","val":14.99}];
var MO=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
var PAL=["#2D5BE3","#1A7A4A","#D4770A","#C0392B","#7B3FC4","#C0527A","#2E8B8B","#7A6A1A","#5A3A1A","#888","#1A5A7A","#7A1A5A"];
var CM={};
function cor(k){if(!CM[k]){var n=Object.keys(CM).length;CM[k]=PAL[n%PAL.length];}return CM[k];}
function fmt(n){return"R$ "+Number(n).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
var cB=null,cD=null;
var allData=AD.map(function(r){var m=r.mes.trim();return Object.assign({},r,{mes:m.charAt(0).toUpperCase()+m.slice(1).toLowerCase()});});
function init(){
  var meses=[...new Set(allData.map(function(d){return d.mes;}))].sort(function(a,b){return MO.indexOf(a)-MO.indexOf(b);});
  var descs=[...new Set(allData.map(function(d){return d.desc;}))].sort();
  document.getElementById("sM").innerHTML='<option value="all">Todos os meses</option>'+meses.map(function(m){return'<option value="'+m+'">'+m+'</option>';}).join('');
  document.getElementById("sD").innerHTML='<option value="all">Todas as lojas</option>'+descs.map(function(d){return'<option value="'+d+'">'+d+'</option>';}).join('');
  render();
}
function getF(){
  var m=document.getElementById("sM").value,d=document.getElementById("sD").value;
  return allData.filter(function(r){return(m==="all"||r.mes===m)&&(d==="all"||r.desc===d);});
}
function render(){
  var data=getF();
  var total=data.reduce(function(s,r){return s+r.val;},0);
  var bM={},bD={};
  data.forEach(function(r){bM[r.mes]=(bM[r.mes]||0)+r.val;bD[r.desc]=(bD[r.desc]||0)+r.val;});
  var tM=Object.entries(bM).sort(function(a,b){return b[1]-a[1];})[0];
  var tD=Object.entries(bD).sort(function(a,b){return b[1]-a[1];})[0];
  document.getElementById("cards").innerHTML=
    '<div class="card ac"><div class="cl">Total no período</div><div class="cv">'+fmt(total)+'</div><div class="cs">'+data.length+' lançamento(s)</div></div>'
    +'<div class="card"><div class="cl">Maior fatura</div><div class="cv" style="font-size:17px">'+(tM?tM[0]:"—")+'</div>'+(tM?'<div class="cs">'+fmt(tM[1])+'</div>':"")+'</div>'
    +'<div class="card"><div class="cl">Maior loja</div><div class="cv" style="font-size:17px">'+(tD?tD[0]:"—")+'</div>'+(tD?'<div class="cs">'+fmt(tD[1])+'</div>':"")+'</div>'
    +'<div class="card"><div class="cl">Meses cobertos</div><div class="cv">'+Object.keys(bM).length+'</div><div class="cs">faturas</div></div>';
  rBar(bM);rDona(data);rTable(data);
}
function rBar(bM){
  var keys=Object.keys(bM).sort(function(a,b){return MO.indexOf(a)-MO.indexOf(b);});
  var vals=keys.map(function(k){return Math.round(bM[k]*100)/100;});
  if(cB){cB.destroy();cB=null;}
  if(!keys.length)return;
  cB=new Chart(document.getElementById("cB"),{type:"bar",data:{labels:keys,datasets:[{data:vals,backgroundColor:"#C7D9FA",borderColor:"#2D5BE3",borderWidth:1.5,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return" "+fmt(c.raw);}}}},scales:{x:{ticks:{font:{size:11},autoSkip:false,maxRotation:40},grid:{display:false}},y:{ticks:{callback:function(v){return"R$"+v.toFixed(0);},font:{size:11}},grid:{color:"#F0EEE9"}}}}});
}
function rDona(data){
  var bD={};
  data.forEach(function(r){bD[r.desc]=(bD[r.desc]||0)+r.val;});
  var labels=Object.keys(bD);
  var vals=labels.map(function(l){return Math.round(bD[l]*100)/100;});
  var colors=labels.map(function(l){return cor(l);});
  var total=vals.reduce(function(s,v){return s+v;},0);
  document.getElementById("legD").innerHTML=labels.map(function(l,i){return'<span><span class="ld" style="background:'+colors[i]+'"></span>'+l+' '+(total?Math.round(vals[i]/total*100):0)+'%</span>';}).join('');
  if(cD){cD.destroy();cD=null;}
  if(!labels.length)return;
  cD=new Chart(document.getElementById("cD"),{type:"doughnut",data:{labels:labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return" "+fmt(c.raw);}}}}}});
}
function rTable(data){
  var sorted=[...data].sort(function(a,b){return MO.indexOf(a.mes)-MO.indexOf(b.mes)||b.val-a.val;});
  document.getElementById("tc").textContent=sorted.length+" item(s)";
  var tb=document.getElementById("tb"),emp=document.getElementById("emp");
  if(!sorted.length){tb.innerHTML="";emp.style.display="block";return;}
  emp.style.display="none";
  tb.innerHTML=sorted.map(function(r){var c=cor(r.desc);return'<tr><td style="font-size:12px">'+r.data+'</td><td><span class="badge" style="background:'+c+'18;color:'+c+'">'+r.desc+'</span></td><td><span class="mp">'+r.mes+'</span></td><td style="text-align:right;font-weight:600">'+fmt(r.val)+'</td></tr>';}).join('');
}
var s=document.createElement("script");
s.src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js";
s.onload=function(){init();};
document.head.appendChild(s);
</script>
</body>
</html>
